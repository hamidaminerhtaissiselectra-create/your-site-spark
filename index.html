    <!-- Schema.org FAQPage - Optimisé pour recherche vocale & SGE -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Combien coûte la réparation d'un volet roulant à Paris ?", "acceptedAnswer": { "@type": "Answer", "text": "Le coût d'une réparation de volet roulant à Paris varie selon le type de panne. Une réparation de sangle ou de manivelle coûte entre 60€ et 120€. Le remplacement d'un moteur Somfy ou Bubendorff se situe entre 180€ et 350€. Répar'Action Volets réalise un diagnostic gratuit et vous remet un devis détaillé avant toute intervention — sans surprise ni frais cachés." } },
        { "@type": "Question", "name": "Qui peut réparer mes volets roulants en urgence à Paris le week-end ?", "acceptedAnswer": { "@type": "Answer", "text": "Répar'Action Volets propose un service d'urgence disponible 7 jours sur 7, y compris les week-ends et jours fériés. Nous intervenons en priorité pour les volets bloqués en position ouverte (risque de sécurité), les bris de glace et les dommages liés à une tentative d'effraction. Appelez le 06 03 20 59 67 pour une intervention rapide." } },
        { "@type": "Question", "name": "Quels types de volets roulants réparez-vous ?", "acceptedAnswer": { "@type": "Answer", "text": "Nos techniciens interviennent sur tous les types de volets roulants : manuels (sangle, manivelle, treuil), électriques (filaires, radio, solaires), ainsi que les volets en aluminium, PVC ou bois. Nous sommes experts de toutes les grandes marques : Somfy, Bubendorff, Profalux, Franciaflex, Simu, Nice, Becker, Came, Zurflüh-Feller." } },
        { "@type": "Question", "name": "Est-il possible de motoriser un volet roulant manuel existant ?", "acceptedAnswer": { "@type": "Answer", "text": "Absolument. Répar'Action Volets motorise vos volets manuels existants sans travaux de maçonnerie. Nous installons un moteur tubulaire électrique (filaire, radio ou connecté) directement dans le tube d'enroulement de votre volet actuel. L'opération dure 1 à 2 heures par volet. Votre volet devient télécommandé ou pilotable depuis votre smartphone via Somfy TaHoma, Google Home ou Amazon Alexa." } },
        { "@type": "Question", "name": "Quelle garantie proposez-vous sur la réparation de volets roulants ?", "acceptedAnswer": { "@type": "Answer", "text": "Toutes les interventions de Répar'Action Volets sont couvertes par une garantie de 3 ans sur les pièces et la main d'œuvre. Nous utilisons exclusivement des pièces d'origine des fabricants. Notre certification RGE et notre assurance décennale vous protègent en cas de problème." } },
        { "@type": "Question", "name": "Dans quelles villes intervenez-vous pour la réparation de volets ?", "acceptedAnswer": { "@type": "Answer", "text": "Répar'Action Volets intervient principalement à Paris (tous les arrondissements, du 1er au 20e) et en Île-de-France : Boulogne-Billancourt, Neuilly-sur-Seine, Saint-Denis, Versailles, Créteil, et plus de 50 communes. Nous couvrons également les grandes métropoles françaises : Lyon, Marseille, Toulouse, Bordeaux, Nantes, Strasbourg." } },
        { "@type": "Question", "name": "Comment se passe un remplacement de vitrage en urgence ?", "acceptedAnswer": { "@type": "Answer", "text": "En cas de bris de glace, Répar'Action Volets intervient en urgence pour sécuriser votre logement. Nous posons d'abord un vitrage provisoire si nécessaire, puis prenons les mesures exactes pour commander le vitrage définitif adapté (simple, double ou triple vitrage, feuilleté anti-effraction, acoustique). L'installation définitive est réalisée en 1 à 3 heures." } },
        { "@type": "Question", "name": "Quel est le prix d'une installation de volet roulant neuf à Paris ?", "acceptedAnswer": { "@type": "Answer", "text": "Le prix d'une installation de volet roulant neuf à Paris dépend du type (manuel, électrique, solaire), des dimensions et du matériau (aluminium, PVC). Comptez en moyenne entre 350€ et 900€ par volet, pose comprise. Les volets solaires Somfy ou Bubendorff se situent entre 600€ et 1 200€. Répar'Action Volets vous fournit un devis gratuit et détaillé après visite." } },
        { "@type": "Question", "name": "Combien de temps dure la réparation d'un volet roulant ?", "acceptedAnswer": { "@type": "Answer", "text": "La grande majorité de nos réparations sont réalisées en 1 à 2 heures sur place, au premier passage. Nos véhicules sont équipés des pièces de rechange les plus courantes, ce qui nous permet de résoudre 95% des pannes immédiatement." } },
        { "@type": "Question", "name": "Êtes-vous certifié RGE ? Puis-je bénéficier d'aides comme MaPrimeRénov ?", "acceptedAnswer": { "@type": "Answer", "text": "Oui, Répar'Action Volets est certifié RGE (Reconnu Garant de l'Environnement) et Qualibat. Cette double certification vous permet de bénéficier de MaPrimeRénov', de l'éco-PTZ et du crédit d'impôt pour vos travaux d'isolation (installation de volets isolants, double vitrage). Nous vous accompagnons dans vos démarches administratives." } },
        { "@type": "Question", "name": "Quel est le meilleur volet roulant : aluminium ou PVC ?", "acceptedAnswer": { "@type": "Answer", "text": "L'aluminium est le matériau de référence pour les volets roulants haut de gamme : léger, résistant, avec une excellente isolation thermique grâce à la mousse polyuréthane injectée, et une durée de vie supérieure à 20 ans. Le PVC est une solution plus économique, bien adaptée aux fenêtres de taille standard. Répar'Action Volets vous conseille sur le meilleur choix selon votre budget et vos besoins." } },
        { "@type": "Question", "name": "Comment connecter mes volets roulants à la domotique Google Home ou Alexa ?", "acceptedAnswer": { "@type": "Answer", "text": "Répar'Action Volets installe des moteurs Somfy (protocoles RTS et io-homecontrol) et Bubendorff compatibles avec les principales plateformes domotiques : Somfy TaHoma, Google Home, Amazon Alexa, Apple HomeKit. Après l'installation du moteur, nous configurons votre application smartphone et vos scénarios automatisés (lever/coucher du soleil, programmation horaire)." } }
      ]
